services:
  - type: web
    name: Stock_AI_Agent_ETF
    runtime: python
    region: singapore
    plan: free
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:${PORT:-5000} --workers 2 --timeout 120
    healthCheckPath: /health
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false

  - type: cron
    name: Stock_AI_Agent_ETF_MorningPush
    runtime: python
    region: singapore
    branch: main
    schedule: "0 0 * * 1-5"
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
